name: al_reef_app
description: "A new Flutter project."


publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  

  intl: ^0.20.0
  glass: ^2.0.0
  get_it: ^9.2.1
  dartz: ^0.10.1
  skeletonizer: ^2.1.3
  url_launcher: ^6.1.7
  flutter_bloc: ^8.1.0
  path_provider: ^2.1.5
  hydrated_bloc: ^9.0.0
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.7
  google_sign_in: ^6.2.1
  carousel_slider: ^5.1.2
  cupertino_icons: ^1.0.8
  cloud_firestore: ^4.17.5
  flutter_screenutil: ^5.7.0
  osm_search_and_pick: ^0.1.0
  cached_network_image: ^3.2.3
  smooth_page_indicator: ^1.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  rename: ^3.1.0
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.2.18
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo/Cairo-Regular.ttf
        - asset: assets/fonts/cairo/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/cairo/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/cairo/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/cairo/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/cairo/Cairo-Black.ttf
          weight: 900

    - family: IconBroken
      fonts:
        - asset: assets/fonts/icons.ttf
flutter_intl:
  enabled: true

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/appLogo.jpg

flutter_native_splash:
  color: "#ffffff"
  background_image: assets/images/splashBg.png

  android: true
  ios: true
  web: false
  fullscreen: true

  android_12:
    color: "#ffffff"
